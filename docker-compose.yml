version: '3.8'
services:
  mysql:
    image: mysql:8
    container_name: socialapp-db
    environment:
      MYSQL_DATABASE: socialapp
      MYSQL_USER: socialuser
      MYSQL_PASSWORD: socialpass
      MYSQL_ROOT_PASSWORD: rootpass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: